<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="100%" height="100%">
  <defs>
    <!-- Gradiente del cielo hostil -->
    <linearGradient id="cieloHostil" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1423"/>
      <stop offset="40%" stop-color="#090b14"/>
      <stop offset="100%" stop-color="#020203"/>
    </linearGradient>

    <!-- Gradiente de la transición brusca a la oscuridad (El Vacío) -->
    <linearGradient id="elVacio" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="35%" stop-color="#000000" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#000000" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="1"/>
    </linearGradient>

    <!-- Gradientes para la textura de la roca -->
    <linearGradient id="rocaBase" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e2433"/>
      <stop offset="100%" stop-color="#05060a"/>
    </linearGradient>
    
    <!-- Filtro para el resplandor del relámpago -->
    <filter id="resplandorElectrico" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Filtro para las nubes tormentosas -->
    <filter id="desenfoqueNubes" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
  </defs>

  <!-- ================= FONDO ================= -->
  <!-- Cielo base -->
  <rect width="1000" height="600" fill="url(#cieloHostil)"/>

  <!-- Nubes turbulentas -->
  <ellipse cx="150" cy="100" rx="300" ry="150" fill="#1c2336" filter="url(#desenfoqueNubes)" opacity="0.4"/>
  <ellipse cx="400" cy="50" rx="400" ry="200" fill="#0f1322" filter="url(#desenfoqueNubes)" opacity="0.6"/>
  <ellipse cx="250" cy="350" rx="350" ry="180" fill="#05070d" filter="url(#desenfoqueNubes)" opacity="0.8"/>

  <!-- Relámpago (Clima hostil) -->
  <path d="M 220,-10 L 190,120 L 240,140 L 160,280 L 190,300 L 90,480" 
        fill="none" stroke="#60a5fa" stroke-width="2" filter="url(#resplandorElectrico)" opacity="0.4"/>
  <path d="M 220,-10 L 190,120 L 240,140 L 160,280 L 190,300 L 90,480" 
        fill="none" stroke="#ffffff" stroke-width="1" opacity="0.7"/>

  <!-- ================= EL ACANTILADO ================= -->
  <!-- Capa de roca profunda -->
  <path d="M 0,600 L 580,600 L 550,520 L 490,480 L 510,410 L 450,380 L 470,320 L 390,290 L 350,230 L 220,260 L 150,180 L 0,220 Z" 
        fill="#07090f"/>
  
  <!-- Capa de roca media -->
  <path d="M 0,600 L 500,600 L 470,540 L 420,510 L 450,440 L 380,410 L 400,340 L 320,310 L 270,260 L 160,290 L 80,220 L 0,250 Z" 
        fill="url(#rocaBase)"/>

  <!-- Capa de roca frontal (Donde se aferra el sobreviviente) -->
  <path d="M 0,600 L 420,600 L 380,510 L 340,490 L 370,420 L 290,390 L 310,330 L 240,320 L 200,280 L 100,310 L 0,280 Z" 
        fill="#111622" stroke="#2e3a59" stroke-width="1.5"/>

  <!-- Grietas en la roca para dar firmeza y textura -->
  <path d="M 240,320 L 220,380 L 260,420 M 310,330 L 280,400 L 320,460" 
        fill="none" stroke="#05060a" stroke-width="3" opacity="0.6"/>


  <!-- ================= EL SOBREVIVIENTE (Centro de gravedad bajo) ================= -->
  <!-- Ubicado en el borde, aferrándose contra el viento que empuja hacia la derecha -->
  <g id="sobreviviente" transform="translate(290, 290)">
    <!-- Cabeza agachada -->
    <circle cx="10" cy="15" r="8" fill="#000000"/>
    
    <!-- Torso inclinado extrema hacia adelante y abajo -->
    <path d="M 15,18 L -5,35 L 5,42 L 25,25 Z" fill="#000000"/>
    
    <!-- Pierna izquierda anclada firmemente -->
    <path d="M 0,35 L -20,45 L -15,52 L 5,42 Z" fill="#000000"/>
    
    <!-- Pierna derecha extendida para balance -->
    <path d="M 10,38 L 30,50 L 25,55 L 5,42 Z" fill="#000000"/>
    
    <!-- Brazos aferrándose a la roca -->
    <path d="M 15,20 L 35,35 L 30,40 L 10,25 Z" fill="#000000"/>
    <path d="M 15,20 L 5,40 L 0,40 L 10,25 Z" fill="#000000"/>

    <!-- Capa/Ropa ondeando violentamente hacia el vacío (derecha) -->
    <!-- Muestra la fuerza aplastante del viento huracanado -->
    <path d="M 15,18 Q 60,10 90,25 Q 50,25 20,28 Z" fill="#000000"/>
    <path d="M 18,22 Q 70,25 110,45 Q 60,40 22,32 Z" fill="#000000"/>
    <path d="M -5,30 Q 40,35 80,55 Q 30,45 0,38 Z" fill="#000000"/>
  </g>


  <!-- ================= VIENTOS HURACANADOS Y LLUVIA ================= -->
  <!-- Líneas de viento sinuosas y caóticas -->
  <g id="viento" fill="none" stroke="#ffffff">
    <path d="M -50,150 Q 200,160 400,200 T 1050,280" stroke-width="3" opacity="0.1"/>
    <path d="M -50,250 Q 150,280 350,240 T 1050,300" stroke-width="1.5" opacity="0.2"/>
    <path d="M -50,350 Q 300,400 550,320 T 1050,400" stroke-width="4" opacity="0.08"/>
    <path d="M 100,50 Q 400,20 600,120 T 1050,150" stroke-width="2" opacity="0.15"/>
    <path d="M 50,450 Q 250,480 450,420 T 1050,480" stroke-width="1" opacity="0.25"/>
  </g>

  <!-- Lluvia torrencial casi horizontal por la fuerza del huracán -->
  <g id="lluvia" stroke="#a9bde0" stroke-width="1" opacity="0.3">
    <!-- Se simula el azote del clima con líneas repetidas en ángulo agudo -->
    <line x1="50" y1="20" x2="150" y2="30"/>
    <line x1="250" y1="40" x2="380" y2="55"/>
    <line x1="120" y1="100" x2="260" y2="115"/>
    <line x1="400" y1="80" x2="550" y2="95"/>
    <line x1="50" y1="180" x2="220" y2="200"/>
    <line x1="300" y1="160" x2="480" y2="180"/>
    <line x1="500" y1="140" x2="650" y2="155"/>
    <line x1="180" y1="250" x2="350" y2="270"/>
    <line x1="420" y1="230" x2="600" y2="250"/>
    <line x1="80" y1="320" x2="250" y2="340"/>
    <line x1="350" y1="350" x2="520" y2="370"/>
    <line x1="150" y1="420" x2="320" y2="440"/>
    <line x1="450" y1="400" x2="600" y2="420"/>
    <line x1="280" y1="480" x2="450" y2="500"/>
    <line x1="50" y1="520" x2="200" y2="540"/>
  </g>

  <!-- Escombros y rocas volando hacia el vacío -->
  <g id="escombros" fill="#000000" opacity="0.8">
    <polygon points="400,200 410,195 415,205 405,210"/>
    <polygon points="550,250 565,245 570,260 555,255"/>
    <polygon points="320,150 325,148 328,155"/>
    <polygon points="480,320 495,315 490,330 475,325"/>
    <polygon points="620,380 630,375 635,385"/>
    <circle cx="380" cy="280" r="2"/>
    <circle cx="500" cy="220" r="3"/>
    <circle cx="580" cy="300" r="1.5"/>
  </g>

  <!-- ================= TRANSICIÓN A LA OSCURIDAD ================= -->
  <!-- El vacío que devora la parte derecha de la imagen antes del cierre -->
  <rect x="400" y="0" width="600" height="600" fill="url(#elVacio)"/>

  <!-- Viñeta global para encerrar la escena y aumentar la opresión -->
  <path d="M 0,0 L 1000,0 L 1000,600 L 0,600 Z M 50,50 L 50,550 L 950,550 L 950,50 Z" 
        fill="#000000" fill-rule="evenodd" opacity="0.4" filter="url(#desenfoqueNubes)"/>

</svg>