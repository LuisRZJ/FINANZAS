<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="100%" height="100%">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="50%" stop-color="#091024"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="snowLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="80%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="snowDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-subtle" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.03" />
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#skyGrad)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <path d="M-100 630 L150 420 L300 500 L450 380 L600 630 Z" fill="#0b1326" opacity="0.8"/>
  <path d="M500 630 L800 350 L950 480 L1150 280 L1300 450 L1300 630 Z" fill="#0b1326" opacity="0.7"/>
  <path d="M-50 630 L250 350 L400 450 L500 280 L650 480 L800 630 Z" fill="#0f1933" opacity="0.9"/>
  <path d="M800 630 L950 320 L1050 420 L1200 200 L1300 350 L1300 630 Z" fill="#0f1933" opacity="0.8"/>
  <path d="M600 120 L1050 630 L600 630 L560 500 L610 380 L580 250 Z" fill="url(#snowDark)" />
  <path d="M600 120 L580 250 L610 380 L560 500 L600 630 L150 630 Z" fill="url(#snowLight)" />
  <polygon points="580 250 540 300 590 340" fill="#cbd5e1" opacity="0.8"/>
  <polygon points="610 380 520 450 560 500" fill="#94a3b8" opacity="0.9"/>
  <polygon points="560 500 400 580 500 630" fill="#64748b" opacity="0.7"/>
  <polygon points="600 630 650 550 750 630" fill="#020617" opacity="0.6"/>
  <polygon points="610 380 660 450 630 500" fill="#020617" opacity="0.8"/>
  <line x1="100" y1="250" x2="300" y2="250" stroke="#ffffff" stroke-width="1" opacity="0.1" stroke-dasharray="10 30"/>
  <line x1="850" y1="180" x2="1100" y2="180" stroke="#ffffff" stroke-width="1" opacity="0.05" stroke-dasharray="20 40"/>
  <line x1="200" y1="400" x2="400" y2="380" stroke="#ffffff" stroke-width="1" opacity="0.15" stroke-dasharray="5 15"/>
  <line x1="750" y1="350" x2="1000" y2="330" stroke="#ffffff" stroke-width="1" opacity="0.08" stroke-dasharray="15 25"/>
  <circle cx="600" cy="120" r="80" fill="none" stroke="#ff003c" stroke-width="0.5" opacity="0.2"/>
  <circle cx="600" cy="120" r="50" fill="none" stroke="#ff003c" stroke-width="1" opacity="0.4" stroke-dasharray="4 8"/>
  <circle cx="600" cy="120" r="30" fill="none" stroke="#ff003c" stroke-width="1" opacity="0.8"/>
  <line x1="450" y1="120" x2="750" y2="120" stroke="#ff003c" stroke-width="1" opacity="0.5"/>
  <line x1="600" y1="20" x2="600" y2="220" stroke="#ff003c" stroke-width="1" opacity="0.5"/>
  <line x1="150" y1="630" x2="600" y2="120" stroke="#ff003c" stroke-width="3" filter="url(#glow)"/>
  <line x1="150" y1="630" x2="600" y2="120" stroke="#ffffff" stroke-width="1"/>
  <circle cx="300" cy="460" r="5" fill="#020617" stroke="#ff003c" stroke-width="2" filter="url(#glow-subtle)"/>
  <circle cx="450" cy="290" r="5" fill="#020617" stroke="#ff003c" stroke-width="2" filter="url(#glow-subtle)"/>
  <polygon points="600,105 615,120 600,135 585,120" fill="#ff003c" filter="url(#glow)"/>
  <polygon points="600,110 610,120 600,130 590,120" fill="#ffffff"/>
  <g font-family="Courier New, monospace" font-size="12" letter-spacing="3">
    <line x1="40" y1="540" x2="90" y2="540" stroke="#ff003c" stroke-width="3" filter="url(#glow-subtle)"/>
    <text x="40" y="565" fill="#e2e8f0" font-weight="bold">ESTRATEGIA ANUAL //</text>
    <text x="215" y="565" fill="#ff003c" font-weight="bold" filter="url(#glow-subtle)">EJECUCIÓN PURA</text>
    <text x="40" y="585" fill="#64748b" font-size="10" letter-spacing="1.5">CERO DISTRACCIONES. TERRENO HOSTIL.</text>
    <text x="40" y="600" fill="#475569" font-size="10" letter-spacing="1.5">SIN MARGEN PARA LA DEBILIDAD.</text>
  </g>
  <g font-family="Courier New, monospace" font-size="10" fill="#475569" letter-spacing="2">
    <text x="1160" y="555" text-anchor="end">COORD: 89.12N / 14.30W</text>
    <text x="1160" y="575" text-anchor="end">ESTADO: SILENCIO ABSOLUTO</text>
    <text x="1160" y="595" text-anchor="end" fill="#cbd5e1">OBJETIVO: CIMA</text>
    <circle cx="1155" cy="592" r="3" fill="#ff003c" filter="url(#glow-subtle)"/>
  </g>
  <circle cx="150" cy="630" r="8" fill="none" stroke="#ff003c" stroke-width="2"/>
  <circle cx="150" cy="630" r="3" fill="#ff003c"/>
</svg>
