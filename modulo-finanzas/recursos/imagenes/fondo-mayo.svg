<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Gradiente para el cielo (Clima óptimo, día radiante) -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0077ff" />
      <stop offset="60%" stop-color="#55aaff" />
      <stop offset="100%" stop-color="#cceeff" />
    </linearGradient>

    <!-- Gradiente para el sol (Claridad total) -->
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="30%" stop-color="#ffdd44" />
      <stop offset="100%" stop-color="#ffaa00" stop-opacity="0" />
    </radialGradient>

    <!-- Gradiente para el terreno despejado (Campo abierto) -->
    <linearGradient id="fieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#aacc44" />
      <stop offset="100%" stop-color="#338822" />
    </linearGradient>

    <!-- Gradiente para la carretera (Terreno para pisar el acelerador) -->
    <linearGradient id="roadGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#555566" />
      <stop offset="100%" stop-color="#1a1a24" />
    </linearGradient>

    <!-- Gradiente para el resplandor del horizonte -->
    <radialGradient id="horizonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Filtro de brillo para los "primeros resultados" -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- CIELO -->
  <rect width="800" height="300" fill="url(#skyGrad)" />

  <!-- SOL (Radiante, centro de claridad) -->
  <circle cx="400" cy="180" r="150" fill="url(#sunGrad)" />
  <circle cx="400" cy="180" r="40" fill="#ffffff" filter="url(#glow)" />

  <!-- MONTAÑAS SUAVES (Fondo, sin obstruir) -->
  <path d="M0 300 Q 150 220 300 300 Z" fill="#77bb55" opacity="0.8" />
  <path d="M500 300 Q 650 200 800 300 Z" fill="#66aa44" opacity="0.8" />
  <path d="M100 300 Q 250 250 400 300 Z" fill="#88cc66" opacity="0.6" />
  <path d="M400 300 Q 550 260 700 300 Z" fill="#559933" opacity="0.6" />

  <!-- CAMPO ABIERTO -->
  <rect y="300" width="800" height="200" fill="url(#fieldGrad)" />

  <!-- CARRETERA (Perspectiva de aceleración a fondo) -->
  <polygon points="395,300 405,300 700,500 100,500" fill="url(#roadGrad)" />

  <!-- LÍNEAS DE LA CARRETERA (Sensación de velocidad) -->
  <!-- Bordes -->
  <polygon points="395,300 397,300 115,500 100,500" fill="#ffffff" opacity="0.7"/>
  <polygon points="405,300 403,300 685,500 700,500" fill="#ffffff" opacity="0.7"/>
  
  <!-- Línea central discontinua (Efecto de perspectiva) -->
  <polygon points="399.5,310 400.5,310 401,320 399,320" fill="#ffcc00" />
  <polygon points="399,335 401,335 402,355 398,355" fill="#ffcc00" />
  <polygon points="398,375 402,375 403.5,405 396.5,405" fill="#ffcc00" />
  <polygon points="396.5,435 403.5,435 406,480 394,480" fill="#ffcc00" />

  <!-- EFECTOS DE VELOCIDAD (Líneas cinéticas en la carretera) -->
  <line x1="250" y1="450" x2="220" y2="490" stroke="#ffffff" stroke-width="2" opacity="0.3" />
  <line x1="550" y1="450" x2="580" y2="490" stroke="#ffffff" stroke-width="2" opacity="0.3" />
  <line x1="320" y1="380" x2="300" y2="410" stroke="#ffffff" stroke-width="1.5" opacity="0.4" />
  <line x1="480" y1="380" x2="500" y2="410" stroke="#ffffff" stroke-width="1.5" opacity="0.4" />

  <!-- RESPLANDOR EN EL HORIZONTE (El objetivo claro) -->
  <ellipse cx="400" cy="300" rx="150" ry="20" fill="url(#horizonGlow)" />

  <!-- PRIMEROS RESULTADOS DEL AÑO (Brotes dorados/verdes floreciendo en los laterales) -->
  <!-- Grupo Izquierdo -->
  <g transform="translate(180, 420)">
    <!-- Tallo -->
    <path d="M0,40 C-5,20 10,10 5,0" fill="none" stroke="#ffdd44" stroke-width="3" filter="url(#glow)"/>
    <!-- Hojas/Frutos -->
    <circle cx="5" cy="0" r="6" fill="#ffbb00" filter="url(#glow)" />
    <path d="M-2,15 Q-15,10 -10,25 Q-2,20 -2,15 Z" fill="#88ff44" />
    <path d="M4,25 Q15,20 12,35 Q4,30 4,25 Z" fill="#88ff44" />
  </g>

  <g transform="translate(120, 380) scale(0.6)">
    <path d="M0,40 C-5,20 10,10 5,0" fill="none" stroke="#ffdd44" stroke-width="3" filter="url(#glow)"/>
    <circle cx="5" cy="0" r="6" fill="#ffaa00" filter="url(#glow)" />
    <path d="M-2,15 Q-15,10 -10,25 Q-2,20 -2,15 Z" fill="#66dd33" />
  </g>

  <!-- Grupo Derecho -->
  <g transform="translate(620, 440) scale(1.2)">
    <path d="M0,40 C5,20 -10,10 -5,0" fill="none" stroke="#ffdd44" stroke-width="2.5" filter="url(#glow)"/>
    <circle cx="-5" cy="0" r="5" fill="#ffee00" filter="url(#glow)" />
    <path d="M2,15 Q15,10 10,25 Q2,20 2,15 Z" fill="#aaff55" />
    <path d="M-4,25 Q-15,20 -12,35 Q-4,30 -4,25 Z" fill="#aaff55" />
  </g>

  <g transform="translate(650, 360) scale(0.5)">
    <path d="M0,40 C5,20 -10,10 -5,0" fill="none" stroke="#ffdd44" stroke-width="4" filter="url(#glow)"/>
    <circle cx="-5" cy="0" r="8" fill="#ffcc00" filter="url(#glow)" />
    <path d="M2,15 Q15,10 10,25 Q2,20 2,15 Z" fill="#55cc22" />
  </g>
</svg>