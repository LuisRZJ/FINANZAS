<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg"> <defs> <!-- Fondo atmosférico: La oscuridad y la niebla --> <linearGradient id="bgGradient" x1="0" y1="0" x2="0" y2="1"> <stop offset="0%" stop-color="#070a0d"/> <stop offset="50%" stop-color="#192530"/> <stop offset="100%" stop-color="#4a5d6b"/> </linearGradient> <!-- La luz pálida del entusiasmo inicial que muere --> <radialGradient id="fadingLight" cx="30%" cy="10%" r="70%"> <stop offset="0%" stop-color="#8faac2" stop-opacity="0.15"/> <stop offset="100%" stop-color="#8faac2" stop-opacity="0"/> </radialGradient> <!-- Gradientes de niebla para profundidad --> <linearGradient id="fogLayer1" x1="0" y1="0" x2="0" y2="1"> <stop offset="0%" stop-color="#677f91" stop-opacity="0"/> <stop offset="100%" stop-color="#677f91" stop-opacity="0.6"/> </linearGradient> <linearGradient id="fogLayer2" x1="0" y1="0" x2="0" y2="1"> <stop offset="0%" stop-color="#7a92a3" stop-opacity="0"/> <stop offset="100%" stop-color="#7a92a3" stop-opacity="0.8"/> </linearGradient> <linearGradient id="groundShadow" x1="0" y1="0" x2="0" y2="1"> <stop offset="0%" stop-color="#040608" stop-opacity="0"/> <stop offset="40%" stop-color="#040608" stop-opacity="0.8"/> <stop offset="100%" stop-color="#040608" stop-opacity="1"/> </linearGradient> <!-- Gradiente de la línea del sistema --> <linearGradient id="systemLine" x1="0" y1="0" x2="1" y2="0"> <stop offset="0%" stop-color="#ff5500" stop-opacity="0"/> <stop offset="20%" stop-color="#ffaa00" stop-opacity="0.8"/> <stop offset="50%" stop-color="#ffcc00" stop-opacity="1"/> <stop offset="80%" stop-color="#ffaa00" stop-opacity="0.8"/> <stop offset="100%" stop-color="#ff5500" stop-opacity="0"/> </linearGradient> <!-- Desenfoque gaussiano para los bancos de niebla --> <filter id="blurFog" x="-20%" y="-20%" width="140%" height="140%"> <feGaussianBlur stdDeviation="50"/> </filter> <!-- Símbolo del árbol: Silueta irregular e imponente --> <g id="tree"> <path d="M0,-90 L18,-35 L10,-35 L26,18 L14,18 L35,70 L-35,70 L-14,18 L-26,18 L-10,-35 L-18,-35 Z"/> <rect x="-5" y="70" width="10" height="25"/> </g> </defs> <!-- CIELO Y LUZ TENUE --> <rect width="1200" height="600" fill="url(#bgGradient)"/> <rect width="1200" height="600" fill="url(#fadingLight)"/> <!-- CAPA 1: Árboles en la distancia profunda (amateurs perdidos aquí) --> <g fill="#1f2c38" opacity="0.5"> <use href="#tree" transform="translate(60, 360) scale(0.5)"/> <use href="#tree" transform="translate(180, 370) scale(0.6)"/> <use href="#tree" transform="translate(290, 355) scale(0.45)"/> <use href="#tree" transform="translate(420, 375) scale(0.55)"/> <use href="#tree" transform="translate(530, 360) scale(0.5)"/> <use href="#tree" transform="translate(670, 380) scale(0.65)"/> <use href="#tree" transform="translate(790, 365) scale(0.48)"/> <use href="#tree" transform="translate(910, 375) scale(0.58)"/> <use href="#tree" transform="translate(1040, 360) scale(0.52)"/> <use href="#tree" transform="translate(1150, 380) scale(0.6)"/> </g> <!-- BANCO DE NIEBLA 1 --> <rect x="0" y="250" width="1200" height="350" fill="url(#fogLayer1)"/> <ellipse cx="300" cy="400" rx="300" ry="100" fill="#8faac2" opacity="0.25" filter="url(#blurFog)"/> <ellipse cx="900" cy="380" rx="350" ry="120" fill="#8faac2" opacity="0.2" filter="url(#blurFog)"/> <!-- CAPA 2: Árboles en el plano medio --> <g fill="#141c24" opacity="0.75"> <use href="#tree" transform="translate(100, 420) scale(0.8)"/> <use href="#tree" transform="translate(250, 435) scale(0.9)"/> <use href="#tree" transform="translate(400, 415) scale(0.75)"/> <use href="#tree" transform="translate(560, 440) scale(0.95)"/> <use href="#tree" transform="translate(710, 425) scale(0.85)"/> <use href="#tree" transform="translate(860, 445) scale(1.0)"/> <use href="#tree" transform="translate(1000, 420) scale(0.8)"/> <use href="#tree" transform="translate(1120, 435) scale(0.9)"/> </g> <!-- BANCO DE NIEBLA 2 (Cercano y denso) --> <rect x="0" y="300" width="1200" height="300" fill="url(#fogLayer2)"/> <ellipse cx="600" cy="480" rx="500" ry="150" fill="#a4bdcf" opacity="0.25" filter="url(#blurFog)"/> <!-- CAPA 3: Árboles en primer plano (Grandes, imponentes, cerrando el paso) --> <g fill="#070a0d"> <use href="#tree" transform="translate(20, 520) scale(1.5)"/> <use href="#tree" transform="translate(180, 540) scale(1.7)"/> <use href="#tree" transform="translate(340, 510) scale(1.4)"/> <!-- Hueco central para enfatizar la brújula --> <use href="#tree" transform="translate(480, 550) scale(1.6)"/> <use href="#tree" transform="translate(720, 530) scale(1.5)"/> <use href="#tree" transform="translate(880, 560) scale(1.8)"/> <use href="#tree" transform="translate(1060, 520) scale(1.4)"/> <use href="#tree" transform="translate(1190, 550) scale(1.6)"/> </g> <!-- SOMBRA DEL SUELO / VACÍO INFERIOR --> <rect x="0" y="450" width="1200" height="150" fill="url(#groundShadow)"/> <!-- ========================================== --> <!-- LA BRÚJULA Y EL SISTEMA (Interfaz de guía) --> <!-- ========================================== --> <g transform="translate(0, 530)"> <!-- Línea principal del sistema --> <rect x="150" y="0" width="900" height="2" fill="url(#systemLine)"/> <rect x="150" y="0" width="900" height="1" fill="#ffffff" opacity="0.6"/> <!-- Marcas de calibración (Tick marks) --> <g stroke="#ffcc00" stroke-width="1" opacity="0.5"> <path d="M200,-5 L200,5 M250,-2 L250,2 M300,-5 L300,5 M350,-2 L350,2 M400,-5 L400,5 M450,-2 L450,2 M500,-5 L500,5 M550,-2 L550,2"/> <path d="M650,-2 L650,2 M700,-5 L700,5 M750,-2 L750,2 M800,-5 L800,5 M850,-2 L850,2 M900,-5 L900,5 M950,-2 L950,2 M1000,-5 L1000,5"/> </g> <!-- Elemento central: La Brújula --> <g transform="translate(600, 0)"> <!-- Anillos resplandecientes --> <circle cx="0" cy="0" r="24" fill="#ffaa00" opacity="0.1"/> <circle cx="0" cy="0" r="18" stroke="#ffaa00" stroke-width="1.5" fill="none" opacity="0.9"/> <circle cx="0" cy="0" r="12" stroke="#ffcc00" stroke-width="0.5" stroke-dasharray="2,2" fill="none" opacity="0.7"/> <!-- Ejes de la brújula --> <path d="M0,-24 L0,24" stroke="#ffcc00" stroke-width="1" opacity="0.6"/> <path d="M-24,0 L24,0" stroke="#ffcc00" stroke-width="1" opacity="0.6"/> <!-- Aguja apuntando al norte (El avance) --> <path d="M0,-3 L6,-8 L0,-22 L-6,-8 Z" fill="#ffcc00" opacity="1"/> <!-- Contrapeso de la aguja --> <path d="M0,3 L3,6 L0,12 L-3,6 Z" fill="#ff5500" opacity="0.8"/> <circle cx="0" cy="0" r="3" fill="#ffffff"/> </g> <!-- Texto de datos técnicos (El "Sistema") --> <text x="200" y="25" fill="#ffaa00" font-family="monospace" font-size="10" letter-spacing="3" opacity="0.8">VISIBILIDAD: REDUCIDA</text> <text x="1000" y="25" fill="#ffaa00" font-family="monospace" font-size="10" letter-spacing="3" text-anchor="end" opacity="0.8">NAVEGACIÓN POR SISTEMA</text> <text x="600" y="32" fill="#ffcc00" font-family="monospace" font-size="11" font-weight="bold" letter-spacing="5" text-anchor="middle" opacity="0.9">AVANCE CONSTANTE</text> </g> </svg>