<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
  <defs>
    <!-- Gradients for the Sky and Earth -->
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#05050a" />
      <stop offset="50%" stop-color="#121221" />
      <stop offset="100%" stop-color="#1a1c29" />
    </linearGradient>
    
    <linearGradient id="earthGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111111" />
      <stop offset="15%" stop-color="#0a0a0a" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>

    <!-- Tactical Grid Pattern -->
    <pattern id="tacticalGrid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.05" />
      <circle cx="0" cy="0" r="1.5" fill="#ffffff" fill-opacity="0.1" />
    </pattern>

    <!-- Intense Rain Pattern -->
    <pattern id="rain" width="150" height="150" patternUnits="userSpaceOnUse" patternTransform="rotate(18)">
      <line x1="20" y1="-20" x2="20" y2="150" stroke="#7bb0ff" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="10 30" />
      <line x1="60" y1="-50" x2="60" y2="200" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.2" stroke-dasharray="25 15" />
      <line x1="100" y1="10" x2="100" y2="180" stroke="#a4d4ff" stroke-width="2" stroke-opacity="0.3" stroke-dasharray="40 40" />
      <line x1="130" y1="-10" x2="130" y2="120" stroke="#ffffff" stroke-width="1" stroke-opacity="0.15" stroke-dasharray="15 50" />
      <!-- Horizontal wind streaks (tactical chaos) -->
      <line x1="0" y1="50" x2="150" y2="50" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.08" stroke-dasharray="5 20" />
    </pattern>

    <!-- Glow Filters -->
    <filter id="lightningGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="rootGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="intenseGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur1" />
      <feGaussianBlur stdDeviation="25" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .lightning { animation: flash 4s infinite; }
    .roots { animation: pulse 3s infinite alternate; }
    .rain-layer { animation: fall 0.8s linear infinite; }
    
    @keyframes flash {
      0%, 95%, 98% { opacity: 1; }
      96%, 99% { opacity: 0.2; }
      97%, 100% { opacity: 0.8; }
    }
    @keyframes pulse {
      0% { filter: drop-shadow(0 0 5px #00ff66) drop-shadow(0 0 10px #00ff66); }
      100% { filter: drop-shadow(0 0 10px #00ff66) drop-shadow(0 0 20px #00ff66); }
    }
    @keyframes fall {
      to { transform: translateY(150px) translateX(-50px); }
    }
  </style>

  <!-- ================= SKY & GRID ================= -->
  <rect width="1200" height="600" fill="url(#skyGrad)" />
  <rect width="1200" height="600" fill="url(#tacticalGrid)" />

  <!-- ================= STORM CLOUDS ================= -->
  <!-- Deep back clouds -->
  <path d="M-100,200 Q150,50 350,150 T800,80 T1300,250 L1300,-100 L-100,-100 Z" fill="#08080f" opacity="0.9"/>
  <!-- Mid clouds -->
  <path d="M-50,150 Q200,250 450,120 T950,200 T1250,100 L1250,-50 L-50,-50 Z" fill="#0d0e1a" opacity="0.8"/>
  <!-- Front jagged chaotic clouds -->
  <path d="M-100,50 L50,120 L150,80 L250,180 L400,100 L550,220 L700,130 L850,260 L1000,150 L1150,200 L1300,50 L1300,-50 L-100,-50 Z" fill="#121424" />

  <!-- ================= TACTICAL CHAOS / BACKGROUND LIGHTNING ================= -->
  <!-- Distant faint lightning -->
  <path d="M 250,150 L 230,250 L 260,280 L 220,380 L 250,420 L 210,550" fill="none" stroke="#4a6ca6" stroke-width="2" opacity="0.4" filter="url(#lightningGlow)"/>
  <path d="M 950,120 L 980,220 L 940,260 L 990,350 L 950,450" fill="none" stroke="#4a6ca6" stroke-width="1.5" opacity="0.3" filter="url(#lightningGlow)"/>
  
  <!-- Tactical targeting reticles in the sky -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.15" fill="none">
    <circle cx="600" cy="550" r="150" stroke-dasharray="10 20" />
    <circle cx="600" cy="550" r="100" />
    <line x1="400" y1="550" x2="800" y2="550" stroke-dasharray="5 15" />
    <line x1="600" y1="350" x2="600" y2="750" stroke-dasharray="5 15" />
  </g>

  <!-- ================= HEAVY RAIN ================= -->
  <rect width="1400" height="1000" x="-100" y="-100" fill="url(#rain)" />
  
  <!-- ================= MAIN LIGHTNING STRIKE ================= -->
  <!-- Represents the "fricción necesaria", striking the exact center -->
  <g class="lightning">
    <!-- Outer glow -->
    <path d="M 600,-50 L 560,100 L 630,160 L 580,280 L 650,330 L 570,450 L 610,490 L 600,595" fill="none" stroke="#00ffff" stroke-width="12" opacity="0.3" filter="url(#lightningGlow)"/>
    <!-- Core white bolt -->
    <path d="M 600,-50 L 560,100 L 630,160 L 580,280 L 650,330 L 570,450 L 610,490 L 600,595" fill="none" stroke="#ffffff" stroke-width="5" filter="url(#lightningGlow)"/>
    
    <!-- Lightning Branches -->
    <path d="M 580,280 L 480,320 L 450,400 L 380,450" fill="none" stroke="#ffffff" stroke-width="2" filter="url(#lightningGlow)" opacity="0.8"/>
    <path d="M 650,330 L 720,380 L 700,430 L 780,490" fill="none" stroke="#ffffff" stroke-width="1.5" filter="url(#lightningGlow)" opacity="0.7"/>
    <path d="M 570,450 L 500,480 L 480,550" fill="none" stroke="#ffffff" stroke-width="1" filter="url(#lightningGlow)" opacity="0.6"/>
  </g>

  <!-- ================= THE PLAIN & GROUND CROSS-SECTION ================= -->
  <!-- Back rocky horizon -->
  <path d="M 0,590 Q 150,570 300,585 T 600,595 T 900,580 T 1200,590 L 1200,800 L 0,800 Z" fill="#0d0d12" />
  <!-- Main ground section showing dirt and depth -->
  <path d="M 0,600 Q 200,595 400,605 T 600,600 T 800,608 T 1000,598 T 1200,605 L 1200,800 L 0,800 Z" fill="url(#earthGrad)" />
  <!-- Crust edge / Surface friction line -->
  <path d="M 0,600 Q 200,595 400,605 T 600,600 T 800,608 T 1000,598 T 1200,605" fill="none" stroke="#222222" stroke-width="4" />

  <!-- Underground tactical chaos / structural lines -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.03" fill="none">
    <path d="M 200,600 L 200,800 M 400,600 L 400,800 M 800,600 L 800,800 M 1000,600 L 1000,800" />
    <path d="M 0,650 L 1200,650 M 0,700 L 1200,700 M 0,750 L 1200,750" />
    <!-- Diagonal tectonic fractures -->
    <path d="M 100,600 L -50,800 M 350,600 L 150,800 M 850,600 L 1050,800 M 1100,600 L 1250,800" stroke-opacity="0.06"/>
  </g>

  <!-- ================= FORCED GROWTH / REAL ROOTS ================= -->
  <!-- Center impact flash where lightning hits the plant -->
  <circle cx="600" cy="595" r="25" fill="#ffffff" filter="url(#intenseGlow)" opacity="0.9" class="lightning"/>
  <circle cx="600" cy="595" r="60" fill="#00ffcc" filter="url(#intenseGlow)" opacity="0.4" class="lightning"/>

  <!-- The Roots - Channeling the destructive energy into deep growth -->
  <g class="roots" filter="url(#rootGlow)">
    <!-- Central Taproot -->
    <path d="M 600,595 Q 610,630 595,670 T 610,740 T 590,790" fill="none" stroke="#00ff66" stroke-width="6" stroke-linecap="round"/>
    
    <!-- Primary Branches -->
    <path d="M 600,610 Q 560,630 520,680 T 450,750" fill="none" stroke="#00ff66" stroke-width="4" stroke-linecap="round"/>
    <path d="M 600,610 Q 650,620 680,660 T 750,730" fill="none" stroke="#00ff66" stroke-width="4.5" stroke-linecap="round"/>
    
    <!-- Secondary deep branches -->
    <path d="M 595,670 Q 550,680 500,730 T 420,780" fill="none" stroke="#00cc55" stroke-width="3" stroke-linecap="round"/>
    <path d="M 610,650 Q 670,680 720,720 T 800,760" fill="none" stroke="#00cc55" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Fine tactical micro-roots (angular, searching) -->
    <path d="M 520,680 L 490,690 L 480,720 L 440,730" fill="none" stroke="#00ffcc" stroke-width="1.5" />
    <path d="M 680,660 L 710,650 L 730,680 L 770,670" fill="none" stroke="#00ffcc" stroke-width="1.5" />
    <path d="M 595,720 L 570,740 L 575,770 L 550,790" fill="none" stroke="#00ffcc" stroke-width="1.5" />
    <path d="M 610,740 L 640,750 L 635,780 L 660,790" fill="none" stroke="#00ffcc" stroke-width="1.5" />
    <path d="M 450,750 L 430,745 L 410,770" fill="none" stroke="#00ffcc" stroke-width="1" />
    <path d="M 750,730 L 780,740 L 790,770" fill="none" stroke="#00ffcc" stroke-width="1" />
  </g>

  <!-- ================= THE SHOOT ================= -->
  <!-- Tiny, battered, but glowing bright. Bending from the wind/impact but holding firm. -->
  <g transform="translate(600, 595)">
    <!-- Stem -->
    <path d="M 0,0 Q -5,-15 15,-30" fill="none" stroke="#00ff66" stroke-width="3" stroke-linecap="round" filter="url(#rootGlow)"/>
    <!-- Leaves (blown to the right by the storm) -->
    <path d="M 5,-10 Q 15,-15 25,-5 Q 15,-5 5,-10 Z" fill="#ffffff" filter="url(#rootGlow)"/>
    <path d="M 10,-20 Q 25,-25 35,-15 Q 25,-15 10,-20 Z" fill="#00ffcc" filter="url(#rootGlow)"/>
  </g>

  <!-- Foreground debris flying in the wind -->
  <g fill="#1a1c29" opacity="0.8">
    <polygon points="200,580 205,575 210,582" />
    <polygon points="250,550 245,540 255,545" />
    <polygon points="700,570 710,565 705,575" />
    <polygon points="800,520 815,510 810,525" />
    <polygon points="500,560 505,550 515,555" />
  </g>

</svg>