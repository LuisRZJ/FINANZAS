<!doctype html>
<html lang="es" class="min-h-full">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="../pwa/logo-app.png">
  <meta name="theme-color" content="#2563eb">
  <title>GTR Finanzas</title>
  <script src="js/sistema/theme.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = window.GTRTheme._twConfig</script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/estilos.css">
</head>

<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 antialiased min-h-screen">
  <header class="bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <div class="flex items-center gap-8">
        <div class="text-xl font-semibold">GTR Finanzas</div>
      </div>
      <div class="flex items-center gap-3">
        <button id="theme-toggle"
          class="inline-flex items-center gap-2 rounded-md px-3 py-2 bg-gray-100 dark:bg-gray-800 text-gray-900 dark:text-gray-100 hover:bg-gray-200 dark:hover:bg-gray-700">
          <span class="hidden sm:inline">Cambiar tema</span>
          <svg class="w-5 h-5 sm:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z">
            </path>
          </svg>
        </button>
      </div>
    </div>
  </header>
  <main class="max-w-2xl mx-auto px-4 sm:px-6 py-8 relative z-10">
    <div class="bg-white dark:bg-gray-800 rounded-3xl shadow-xl border border-gray-100 dark:border-gray-800/80 p-6 md:p-8 relative">
      <!-- Cabecera de Página -->
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-gray-900 dark:text-white tracking-tight">Inicio</h2>
      </div>

      <!-- Resumen Unificado (Elegante y minimalista) -->
      <div class="bg-gray-50 dark:bg-gray-900/60 rounded-3xl p-6 border border-gray-100 dark:border-gray-800/80 mb-8 flex flex-col items-center justify-center text-center">
        <span class="text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wider block mb-1">PNL (Mes Actual)</span>
        <h3 id="balance-amount" class="text-3xl font-extrabold tracking-tight text-gray-900 dark:text-white">—</h3>
        <!-- PNL Badge Container -->
        <div id="balance-badge-container" class="relative group cursor-pointer mt-1.5 hidden">
          <span id="balance-badge" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wider focus:outline-none" tabindex="0"></span>
          <span id="balance-tooltip" class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 px-2.5 py-1 bg-gray-900 dark:bg-gray-950 text-white text-[10px] font-semibold rounded-xl shadow-lg border border-gray-700/50 dark:border-gray-800/80 opacity-0 group-hover:opacity-100 group-focus-within:opacity-100 transition-all duration-200 pointer-events-none whitespace-nowrap z-30 scale-95 group-hover:scale-100 group-focus-within:scale-100">
            <span id="balance-tooltip-text">Mes anterior: $0.00</span>
            <span class="absolute top-full left-1/2 -translate-x-1/2 w-1.5 h-1.5 bg-gray-900 dark:bg-gray-950 border-r border-b border-gray-700/50 dark:border-gray-800/80 rotate-45 -mt-0.5"></span>
          </span>
        </div>
        
        <div class="grid grid-cols-2 gap-8 w-full mt-6 pt-6 border-t border-gray-100 dark:border-gray-800/80">
          <div class="flex items-center justify-center gap-3">
            <div class="w-8 h-8 rounded-full bg-emerald-50 dark:bg-emerald-950/30 flex items-center justify-center text-emerald-500 dark:text-emerald-400 border border-emerald-100/40 dark:border-emerald-900/20">
              <i data-lucide="arrow-down-left" class="w-4 h-4"></i>
            </div>
            <div class="text-left">
              <span class="text-[10px] font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wider block">Ingresos</span>
              <div class="flex items-center gap-1.5 mt-0.5">
                <span id="income-amount" class="text-sm font-bold text-green-600 dark:text-green-400">—</span>
                <!-- Ingresos Badge Container -->
                <div id="income-badge-container" class="relative group cursor-pointer hidden">
                  <span id="income-badge" class="inline-flex items-center px-1.5 py-0.2 rounded-full text-[9px] font-extrabold focus:outline-none" tabindex="0"></span>
                  <span id="income-tooltip" class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 px-2 py-0.5 bg-gray-900 dark:bg-gray-950 text-white text-[9px] font-semibold rounded-lg shadow-lg border border-gray-700/50 dark:border-gray-800/80 opacity-0 group-hover:opacity-100 group-focus-within:opacity-100 transition-all duration-200 pointer-events-none whitespace-nowrap z-30 scale-95 group-hover:scale-100 group-focus-within:scale-100">
                    <span id="income-tooltip-text">Mes anterior: $0.00</span>
                    <span class="absolute top-full left-1/2 -translate-x-1/2 w-1.5 h-1.5 bg-gray-900 dark:bg-gray-950 border-r border-b border-gray-700/50 dark:border-gray-800/80 rotate-45 -mt-0.5"></span>
                  </span>
                </div>
              </div>
            </div>
          </div>
          
          <div class="flex items-center justify-center gap-3">
            <div class="w-8 h-8 rounded-full bg-red-50 dark:bg-red-950/30 flex items-center justify-center text-red-500 dark:text-red-400 border border-red-100/40 dark:border-red-900/20">
              <i data-lucide="arrow-up-right" class="w-4 h-4"></i>
            </div>
            <div class="text-left">
              <span class="text-[10px] font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wider block">Gastos</span>
              <div class="flex items-center gap-1.5 mt-0.5">
                <span id="expense-amount" class="text-sm font-bold text-red-600 dark:text-red-400">—</span>
                <!-- Gastos Badge Container -->
                <div id="expense-badge-container" class="relative group cursor-pointer hidden">
                  <span id="expense-badge" class="inline-flex items-center px-1.5 py-0.2 rounded-full text-[9px] font-extrabold focus:outline-none" tabindex="0"></span>
                  <span id="expense-tooltip" class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 px-2 py-0.5 bg-gray-900 dark:bg-gray-950 text-white text-[9px] font-semibold rounded-lg shadow-lg border border-gray-700/50 dark:border-gray-800/80 opacity-0 group-hover:opacity-100 group-focus-within:opacity-100 transition-all duration-200 pointer-events-none whitespace-nowrap z-30 scale-95 group-hover:scale-100 group-focus-within:scale-100">
                    <span id="expense-tooltip-text">Mes anterior: $0.00</span>
                    <span class="absolute top-full left-1/2 -translate-x-1/2 w-1.5 h-1.5 bg-gray-900 dark:bg-gray-950 border-r border-b border-gray-700/50 dark:border-gray-800/80 rotate-45 -mt-0.5"></span>
                  </span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Sección de Transacciones -->
      <section class="space-y-4">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-lg font-bold text-gray-900 dark:text-white tracking-tight">Transacciones del Mes</h3>
        </div>
        
        <!-- Contenedor del listado fluido (se llena por JS) -->
        <div id="transactions-list" class="space-y-4"></div>
      </section>
  </main>
  <!-- Menú de Navegación Flotante (FAB) -->
  <div class="fixed bottom-6 right-6 z-50 flex flex-col items-end gap-3">
    <!-- Lista de opciones del menú -->
    <div id="fab-menu-options" class="hidden flex flex-col items-end gap-2.5 mb-2 transition-all duration-200 transform translate-y-4 opacity-0">
      <a href="../index.html" class="flex items-center gap-2.5 px-4 py-2.5 rounded-full text-xs font-semibold bg-white/95 dark:bg-gray-800/95 backdrop-blur-md text-gray-700 dark:text-gray-250 border border-gray-200/50 dark:border-gray-700/50 shadow-lg hover:bg-gray-50 dark:hover:bg-gray-750 transition-all hover:-translate-x-1 active:scale-95">
        <i data-lucide="arrow-left" class="w-4 h-4 text-gray-500 dark:text-gray-400"></i>
        <span>Volver al Inicio</span>
      </a>
      <a href="index.html" data-route="index.html" class="flex items-center gap-2.5 px-4 py-2.5 rounded-full text-xs font-semibold bg-white/95 dark:bg-gray-800/95 backdrop-blur-md text-gray-700 dark:text-gray-250 border border-gray-200/50 dark:border-gray-700/50 shadow-lg hover:bg-gray-50 dark:hover:bg-gray-750 transition-all hover:-translate-x-1 active:scale-95">
        <i data-lucide="home" class="w-4 h-4 text-gray-500 dark:text-gray-400"></i>
        <span>Inicio</span>
      </a>
      <a href="cuentas.html" data-route="cuentas.html" class="flex items-center gap-2.5 px-4 py-2.5 rounded-full text-xs font-semibold bg-white/95 dark:bg-gray-800/95 backdrop-blur-md text-gray-700 dark:text-gray-250 border border-gray-200/50 dark:border-gray-700/50 shadow-lg hover:bg-gray-50 dark:hover:bg-gray-750 transition-all hover:-translate-x-1 active:scale-95">
        <i data-lucide="wallet" class="w-4 h-4 text-gray-500 dark:text-gray-400"></i>
        <span>Cuentas</span>
      </a>
      <a href="transacciones.html" data-route="transacciones.html" class="flex items-center gap-2.5 px-4 py-2.5 rounded-full text-xs font-semibold bg-white/95 dark:bg-gray-800/95 backdrop-blur-md text-gray-700 dark:text-gray-250 border border-gray-200/50 dark:border-gray-700/50 shadow-lg hover:bg-gray-50 dark:hover:bg-gray-750 transition-all hover:-translate-x-1 active:scale-95">
        <i data-lucide="list" class="w-4 h-4 text-gray-500 dark:text-gray-400"></i>
        <span>Transacciones</span>
      </a>
      <a href="presupuestos.html" data-route="presupuestos.html" class="flex items-center gap-2.5 px-4 py-2.5 rounded-full text-xs font-semibold bg-white/95 dark:bg-gray-800/95 backdrop-blur-md text-gray-700 dark:text-gray-250 border border-gray-200/50 dark:border-gray-700/50 shadow-lg hover:bg-gray-50 dark:hover:bg-gray-750 transition-all hover:-translate-x-1 active:scale-95">
        <i data-lucide="piggy-bank" class="w-4 h-4 text-gray-500 dark:text-gray-400"></i>
        <span>Presupuestos</span>
      </a>
      <a href="reportes.html" data-route="reportes.html" class="flex items-center gap-2.5 px-4 py-2.5 rounded-full text-xs font-semibold bg-white/95 dark:bg-gray-800/95 backdrop-blur-md text-gray-700 dark:text-gray-250 border border-gray-200/50 dark:border-gray-700/50 shadow-lg hover:bg-gray-50 dark:hover:bg-gray-750 transition-all hover:-translate-x-1 active:scale-95">
        <i data-lucide="bar-chart-2" class="w-4 h-4 text-gray-500 dark:text-gray-400"></i>
        <span>Reportes</span>
      </a>
      <a href="metas.html" data-route="metas.html" class="flex items-center gap-2.5 px-4 py-2.5 rounded-full text-xs font-semibold bg-white/95 dark:bg-gray-800/95 backdrop-blur-md text-gray-700 dark:text-gray-250 border border-gray-200/50 dark:border-gray-700/50 shadow-lg hover:bg-gray-50 dark:hover:bg-gray-750 transition-all hover:-translate-x-1 active:scale-95">
        <i data-lucide="target" class="w-4 h-4 text-gray-500 dark:text-gray-400"></i>
        <span>Metas</span>
      </a>
      <a href="configuracion.html" data-route="configuracion.html" class="flex items-center gap-2.5 px-4 py-2.5 rounded-full text-xs font-semibold bg-white/95 dark:bg-gray-800/95 backdrop-blur-md text-gray-700 dark:text-gray-250 border border-gray-200/50 dark:border-gray-700/50 shadow-lg hover:bg-gray-50 dark:hover:bg-gray-750 transition-all hover:-translate-x-1 active:scale-95">
        <i data-lucide="settings" class="w-4 h-4 text-gray-500 dark:text-gray-400"></i>
        <span>Configuración</span>
      </a>
    </div>

    <!-- Botón FAB principal -->
    <button id="fab-menu-btn" class="w-14 h-14 rounded-full bg-blue-600 dark:bg-blue-500 hover:bg-blue-700 dark:hover:bg-blue-600 text-white flex items-center justify-center shadow-2xl transition-all duration-300 active:scale-95 focus:outline-none relative group" title="Menú de navegación">
      <i data-lucide="menu" id="fab-icon-menu" class="w-6 h-6 transition-all duration-200"></i>
      <i data-lucide="x" id="fab-icon-close" class="w-6 h-6 absolute opacity-0 scale-50 transition-all duration-200"></i>
    </button>
  </div>

  <script>
    (function() {
      const btn = document.getElementById('fab-menu-btn');
      const options = document.getElementById('fab-menu-options');
      const iconMenu = document.getElementById('fab-icon-menu');
      const iconClose = document.getElementById('fab-icon-close');
      
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        const isHidden = options.classList.contains('hidden');
        
        if (isHidden) {
          options.classList.remove('hidden');
          // Forzar reflujo para activar transición
          options.offsetHeight;
          options.classList.remove('translate-y-4', 'opacity-0');
          options.classList.add('translate-y-0', 'opacity-100');
          
          iconMenu.classList.add('opacity-0', 'scale-50');
          iconClose.classList.remove('opacity-0', 'scale-50');
          iconClose.classList.add('opacity-100', 'scale-100');
        } else {
          collapseFAB();
        }
      });

      function collapseFAB() {
        options.classList.remove('translate-y-0', 'opacity-100');
        options.classList.add('translate-y-4', 'opacity-0');
        
        iconMenu.classList.remove('opacity-0', 'scale-50');
        iconMenu.classList.add('opacity-100', 'scale-100');
        iconClose.classList.remove('opacity-100', 'scale-100');
        iconClose.classList.add('opacity-0', 'scale-50');
        
        setTimeout(() => {
          options.classList.add('hidden');
        }, 200);
      }

      // Cerrar al hacer clic fuera
      document.addEventListener('click', function (e) {
        if (!options.classList.contains('hidden') && !btn.contains(e.target) && !options.contains(e.target)) {
          collapseFAB();
        }
      });

      // Inicializar iconos de Lucide al cargar la página
      window.addEventListener('DOMContentLoaded', () => {
        if (window.lucide) {
          window.lucide.createIcons();
        }
      });
    })();
  </script>
  <script type="module" src="js/app.js"></script>
</body>

</html>
